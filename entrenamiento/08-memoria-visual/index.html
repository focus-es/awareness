<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La fotografía mental · Awareness</title>
<link rel="stylesheet" href="../../assets/awareness.css">
</head>
<body>
<script src="../../assets/awareness.js"></script>
<script>
(function () {
  'use strict';

  // Parámetros por nivel: objetos, exposición, preguntas por escena y tipos permitidos
  const LEVELS = [
    { k: 4,  expo: 8000, q: 3, types: ['color', 'objeto', 'color'] },
    { k: 5,  expo: 6000, q: 3, types: ['color', 'orientacion', 'objeto'] },
    { k: 7,  expo: 5000, q: 4, types: ['color', 'orientacion', 'cantidad', 'color'] },
    { k: 9,  expo: 3500, q: 4, types: ['orientacion', 'cantidad', 'posicion', 'color'] },
    { k: 12, expo: 2200, q: 5, types: ['orientacion', 'cantidad', 'posicion', 'posicion', 'color'] }
  ];
  const ROUNDS = 2; // escenas por sesión
  const BG = '#141c2c'; // color del fondo de escena (para máscaras, p. ej. la luna)

  const COLORS = [
    { m: 'dorado', f: 'dorada', hex: '#d9c48f' },
    { m: 'rojo', f: 'roja', hex: '#d98f8f' },
    { m: 'azul', f: 'azul', hex: '#7fb4d9' },
    { m: 'verde', f: 'verde', hex: '#8fc9a8' },
    { m: 'violeta', f: 'violeta', hex: '#9d8fd9' },
    { m: 'blanco', f: 'blanca', hex: '#e8eef7' }
  ];
  const DIRS2 = ['izquierda', 'derecha'];
  const DIRS4 = ['derecha', 'abajo', 'izquierda', 'arriba'];

  // Catálogo de objetos. draw() dibuja mirando a la DERECHA; izquierda = espejo.
  const CATALOG = [
    { id: 'llave', nombre: 'llave', g: 'f', dirs: DIRS2, oq: '¿Hacia dónde apuntaba la llave?',
      draw: function (c) { return '<g stroke="' + c + '" stroke-width="2" stroke-linecap="round" fill="none"><circle cx="-6" cy="0" r="3.4"/><line x1="-2.6" y1="0" x2="8.5" y2="0"/><line x1="5" y1="0" x2="5" y2="3.4"/><line x1="8.5" y1="0" x2="8.5" y2="4.2"/></g>'; } },
    { id: 'bota', nombre: 'bota', g: 'f', dirs: DIRS2, oq: '¿Hacia dónde apuntaba la punta de la bota?',
      draw: function (c) { return '<path d="M-4,-9 L2,-9 L2,2 L7,4 Q9.5,5 9.5,7 L9.5,9 L-4,9 Z" fill="' + c + '"/><line x1="-4" y1="-6.5" x2="2" y2="-6.5" stroke="' + BG + '" stroke-width="1" opacity=".6"/>'; } },
    { id: 'flecha', nombre: 'flecha', g: 'f', dirs: DIRS4, oq: '¿Hacia dónde apuntaba la flecha?',
      draw: function (c) { return '<g stroke="' + c + '" stroke-width="2.4" stroke-linecap="round"><line x1="-8" y1="0" x2="4" y2="0"/></g><polygon points="3,-4.5 10,0 3,4.5" fill="' + c + '"/>'; } },
    { id: 'gato', nombre: 'gato', g: 'm', dirs: DIRS2, oq: '¿Hacia dónde miraba el gato?',
      draw: function (c) { return '<path d="M-7,4 Q-12,2 -10,-4" stroke="' + c + '" stroke-width="1.8" fill="none" stroke-linecap="round"/><ellipse cx="0" cy="4" rx="7" ry="4.6" fill="' + c + '"/><circle cx="5.5" cy="-2" r="4.2" fill="' + c + '"/><polygon points="2.8,-4.6 3.8,-9 6,-5.4" fill="' + c + '"/><polygon points="8.2,-4.6 7.2,-9 5,-5.4" fill="' + c + '"/><circle cx="4.4" cy="-2.6" r=".7" fill="' + BG + '"/><circle cx="6.8" cy="-2.6" r=".7" fill="' + BG + '"/>'; } },
    { id: 'puerta', nombre: 'puerta', g: 'f', dirs: DIRS2, oq: '¿En qué lado tenía el pomo la puerta?',
      draw: function (c) { return '<rect x="-6" y="-9.5" width="12" height="19" rx="1.5" fill="' + c + '"/><rect x="-3.8" y="-7.2" width="7.6" height="6" fill="' + BG + '" opacity=".3"/><circle cx="3.8" cy="1.5" r="1.3" fill="' + BG + '"/>'; } },
    { id: 'taza', nombre: 'taza', g: 'f', dirs: DIRS2, oq: '¿Hacia qué lado miraba el asa de la taza?',
      draw: function (c) { return '<path d="M-6,-5 L-6,4 Q-6,7 -3,7 L3,7 Q6,7 6,4 L6,-5 Z" fill="' + c + '"/><path d="M6,-2.5 Q10.5,-2.5 10.5,.8 Q10.5,4 6,4" stroke="' + c + '" stroke-width="1.8" fill="none"/>'; } },
    { id: 'pez', nombre: 'pez', g: 'm', dirs: DIRS2, oq: '¿Hacia dónde nadaba el pez?',
      draw: function (c) { return '<ellipse cx="1" cy="0" rx="7" ry="4.2" fill="' + c + '"/><polygon points="-5,0 -10.5,-4.5 -10.5,4.5" fill="' + c + '"/><circle cx="5" cy="-1" r=".8" fill="' + BG + '"/>'; } },
    { id: 'luna', nombre: 'luna', g: 'f', dirs: DIRS2, oq: '¿Hacia qué lado miraban las puntas de la luna?',
      draw: function (c) { return '<circle r="8" fill="' + c + '"/><circle cx="3.8" cy="0" r="6.6" fill="' + BG + '"/>'; } },
    { id: 'seta', nombre: 'seta', g: 'f', dirs: null,
      draw: function (c) { return '<path d="M-8.5,.5 Q-8.5,-9 0,-9 Q8.5,-9 8.5,.5 Z" fill="' + c + '"/><rect x="-2.6" y=".5" width="5.2" height="8" rx="2" fill="#dde6f2" opacity=".8"/><circle cx="-3.4" cy="-4" r="1.3" fill="#ffffff" opacity=".5"/><circle cx="3" cy="-3.2" r="1" fill="#ffffff" opacity=".5"/>'; } },
    { id: 'vela', nombre: 'vela', g: 'f', dirs: null,
      draw: function (c) { return '<rect x="-3" y="-2.5" width="6" height="12" rx="1.5" fill="' + c + '"/><line x1="0" y1="-2.5" x2="0" y2="-4.5" stroke="#dde6f2" stroke-width="1"/><ellipse cx="0" cy="-6.8" rx="1.7" ry="2.5" fill="#f0dca8" opacity=".95"/>'; } },
    { id: 'campana', nombre: 'campana', g: 'f', dirs: null,
      draw: function (c) { return '<path d="M-7,4.5 Q-7,-2 -4,-5 Q-2,-8 0,-8 Q2,-8 4,-5 Q7,-2 7,4.5 Z" fill="' + c + '"/><line x1="-8.5" y1="4.5" x2="8.5" y2="4.5" stroke="' + c + '" stroke-width="1.6" stroke-linecap="round"/><circle cx="0" cy="6.8" r="1.7" fill="' + c + '"/>'; } },
    { id: 'corazon', nombre: 'corazón', g: 'm', dirs: null,
      draw: function (c) { return '<path d="M0,8 L-7,.5 Q-9.5,-2.5 -7.5,-5.5 Q-4.5,-9 0,-4.5 Q4.5,-9 7.5,-5.5 Q9.5,-2.5 7,.5 Z" fill="' + c + '"/>'; } },
    { id: 'sombrero', nombre: 'sombrero', g: 'm', dirs: null,
      draw: function (c) { return '<ellipse cx="0" cy="4" rx="10" ry="3" fill="' + c + '"/><path d="M-5.5,4 L-5.5,-3 Q-5.5,-7 0,-7 Q5.5,-7 5.5,-3 L5.5,4 Z" fill="' + c + '"/><line x1="-5.5" y1="1" x2="5.5" y2="1" stroke="' + BG + '" stroke-width="1.2" opacity=".5"/>'; } }
  ];

  // Grupo contable (las estrellas): siempre se pregunta "cuántas"
  const STAR_OFFSETS = {
    2: [[-5, 0], [5, 0]],
    3: [[-6.5, 3], [0, -5], [6.5, 3]],
    4: [[-6, -4.5], [6, -4.5], [-6, 4.5], [6, 4.5]],
    5: [[-7, -4.5], [7, -4.5], [0, 0], [-7, 4.5], [7, 4.5]]
  };
  function starPath(cx, cy, r) {
    let p = '';
    for (let i = 0; i < 10; i++) {
      const a = -Math.PI / 2 + i * Math.PI / 5;
      const rr = i % 2 === 0 ? r : r * .45;
      p += (i === 0 ? 'M' : 'L') + (cx + Math.cos(a) * rr).toFixed(2) + ',' + (cy + Math.sin(a) * rr).toFixed(2);
    }
    return p + 'Z';
  }
  function drawStars(c, count) {
    let out = '';
    (STAR_OFFSETS[count] || STAR_OFFSETS[3]).forEach(o => {
      out += '<path d="' + starPath(o[0], o[1], 3.6) + '" fill="' + c + '"/>';
    });
    return out;
  }

  function shuffle(a, rng) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      const t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  const elNombre = o => (o.def.g === 'f' ? 'la ' : 'el ') + o.def.nombre;
  const unNombre = d => (d.g === 'f' ? 'una ' : 'un ') + d.nombre;

  function buildScene(rng, P) {
    const wantCount = P.types.indexOf('cantidad') >= 0;
    const defs = shuffle(CATALOG.slice(), rng).slice(0, wantCount ? P.k - 1 : P.k);
    const palette = shuffle(COLORS.slice(), rng);
    const objs = defs.map((d, i) => ({
      def: d,
      color: palette[i % palette.length],
      dir: d.dirs ? d.dirs[Math.floor(rng() * d.dirs.length)] : null,
      count: 0
    }));
    if (wantCount) {
      objs.push({
        def: { id: 'estrellas', nombre: 'estrellas', g: 'f', dirs: null },
        color: palette[objs.length % palette.length],
        dir: null,
        count: 2 + Math.floor(rng() * 4) // 2-5
      });
    }
    shuffle(objs, rng);
    const cols = Math.min(4, objs.length), rows = Math.ceil(objs.length / cols);
    objs.forEach((o, i) => {
      o.col = i % cols; o.row = Math.floor(i / cols);
      o.x = 17 + o.col * 32;
      o.y = 18 + o.row * 34;
    });
    return { objs: objs, cols: cols, rows: rows, vbw: 17 * 2 + (cols - 1) * 32, vbh: rows * 34 + 2 };
  }

  function objSVG(o) {
    let body;
    if (o.count) body = drawStars(o.color.hex, o.count);
    else body = o.def.draw(o.color.hex);
    let tf = 'translate(' + o.x + ' ' + o.y + ')';
    if (o.dir === 'izquierda') tf += ' scale(-1,1)';
    else if (o.dir === 'arriba') tf += ' rotate(-90)';
    else if (o.dir === 'abajo') tf += ' rotate(90)';
    return '<g transform="' + tf + '">' + body + '</g>';
  }

  // ---- Generación de preguntas ----
  function genQuestions(rng, scene, P) {
    const pool = [];
    const objs = scene.objs;
    objs.forEach(o => {
      if (!o.count) {
        const otros = COLORS.filter(c => c.m !== o.color.m);
        pool.push({
          type: 'color', obj: o,
          text: '¿De qué color era ' + elNombre(o) + '?',
          correct: cap(o.color[o.def.g]),
          distract: shuffle(otros.slice(), rng).slice(0, 3).map(c => cap(c[o.def.g]))
        });
      }
      if (o.dir) {
        const opts = o.def.dirs === DIRS4 ? DIRS4 : DIRS2;
        pool.push({
          type: 'orientacion', obj: o,
          text: o.def.oq,
          correct: cap(o.dir),
          distract: opts.filter(d => d !== o.dir).map(cap)
        });
      }
      if (o.count) {
        const nums = [o.count - 2, o.count - 1, o.count + 1, o.count + 2].filter(n => n >= 1);
        pool.push({
          type: 'cantidad', obj: o,
          text: '¿Cuántas estrellas había?',
          correct: String(o.count),
          distract: shuffle(nums, rng).slice(0, 3).map(String)
        });
      }
    });
    // objeto presente en la escena
    const ausentes = CATALOG.filter(d => !objs.some(o => o.def.id === d.id));
    if (ausentes.length >= 3) {
      const o = objs[Math.floor(rng() * objs.length)];
      pool.push({
        type: 'objeto', obj: o,
        text: '¿Cuál de estos objetos estaba en la escena?',
        correct: cap(unNombre(o.def)),
        distract: shuffle(ausentes.slice(), rng).slice(0, 3).map(d => cap(unNombre(d)))
      });
    }
    // relaciones espaciales: vecino inmediato en la misma fila
    const nameOf = p => p.count ? 'las estrellas' : elNombre(p);
    objs.forEach(o => {
      const izq = objs.find(p => p.row === o.row && p.col === o.col - 1);
      const der = objs.find(p => p.row === o.row && p.col === o.col + 1);
      [['izquierda', izq], ['derecha', der]].forEach(pair => {
        const vecino = pair[1];
        if (!vecino) return;
        let dist = objs.filter(p => p !== vecino && p !== o).map(p => cap(nameOf(p)));
        shuffle(dist, rng);
        dist = dist.slice(0, 3);
        let ai = 0;
        while (dist.length < 3 && ai < ausentes.length) { dist.push(cap(elNombre({ def: ausentes[ai] }))); ai++; }
        pool.push({
          type: 'posicion', obj: vecino,
          text: '¿Qué estaba justo a la ' + pair[0] + ' de ' + nameOf(o) + '?',
          correct: cap(nameOf(vecino)),
          distract: dist
        });
      });
    });

    // selección: respeta los tipos del nivel, sin repetir objeto
    const picked = [], usedObjs = [];
    for (let i = 0; i < P.q; i++) {
      const want = P.types[i % P.types.length];
      let cand = pool.filter(q => q.type === want && picked.indexOf(q) < 0 && usedObjs.indexOf(q.obj) < 0);
      if (!cand.length) cand = pool.filter(q => picked.indexOf(q) < 0 && usedObjs.indexOf(q.obj) < 0);
      if (!cand.length) cand = pool.filter(q => picked.indexOf(q) < 0);
      if (!cand.length) break;
      const q = cand[Math.floor(rng() * cand.length)];
      picked.push(q); usedObjs.push(q.obj);
    }
    // opciones finales barajadas (nunca reflejan la posición original)
    picked.forEach(q => {
      const opts = q.distract.slice();
      opts.push(q.correct);
      q.opts = shuffle(opts, rng);
    });
    return picked;
  }

  const TYPE_LABEL = { color: 'Color', orientacion: 'Orientación', cantidad: 'Cantidad', posicion: 'Posición', objeto: 'Objetos' };

  Awareness.start({
    id: 'memoria-visual',
    title: 'La fotografía mental',
    tagline: 'Mira la escena como si hicieras una foto: luego responderás preguntas sobre sus detalles.',
    instructions: 'Aparecerá una escena con varios objetos (colores, orientaciones, cantidades, posiciones). ' +
      'Tienes unos segundos para <b>fotografiarla con la mente</b>. Después desaparece y llegan preguntas como ' +
      '<i>"¿De qué color era la bota?"</i> o <i>"¿Qué había junto a la puerta?"</i>. ' +
      'Las opciones de respuesta van siempre barajadas: solo tu memoria puede ayudarte.',
    levelHints: [
      'Pocos objetos y 8 segundos de foto',
      'Menos tiempo; atenta a las orientaciones',
      'Aparecen cantidades: cuenta las estrellas',
      'Preguntas sobre qué estaba junto a qué',
      'Una ojeada de 2 segundos lo es todo'
    ],
    metricLabels: {
      aciertos: 'Aciertos', fallos: 'Fallos', precision: 'Precisión %',
      color: 'Color', orientacion: 'Orientación', cantidad: 'Cantidad', posicion: 'Posición', objeto: 'Objetos'
    },
    primaryMetric: 'precision',
    game: {
      start(ctx) {
        const P = LEVELS[ctx.level - 1];
        const st = ctx.stage;
        st.innerHTML =
          '<div style="position:absolute;inset:0;display:flex;flex-direction:column">' +
          '<div id="bar" style="height:4px;background:var(--accent);width:0%;border-radius:0 2px 2px 0"></div>' +
          '<div id="msg" style="padding:8px;text-align:center;color:var(--dim);font-size:.95rem;min-height:2em"></div>' +
          '<div id="body" style="flex:1;display:flex;flex-direction:column;min-height:0"></div>' +
          '</div>';
        const bar = st.querySelector('#bar');
        const msg = st.querySelector('#msg');
        const body = st.querySelector('#body');

        let round = 0, hits = 0, fails = 0;
        const byType = {};
        let timers = [];
        const T = (fn, ms) => { const t = setTimeout(fn, ms); timers.push(t); return t; };
        ctx.cleanup(() => timers.forEach(clearTimeout));

        const hud = (extra) => ctx.hud.set(Object.assign({
          Escena: Math.min(round, ROUNDS) + '/' + ROUNDS, Aciertos: hits, Fallos: fails
        }, extra || {}));

        const showScene = (scene) => {
          body.innerHTML = '<svg width="100%" height="100%" viewBox="0 0 ' + scene.vbw + ' ' + scene.vbh +
            '" preserveAspectRatio="xMidYMid meet" style="flex:1">' +
            scene.objs.map(objSVG).join('') + '</svg>';
        };

        const askAll = (qs, done) => {
          let qi = 0;
          const askOne = () => {
            if (qi >= qs.length) return done();
            const q = qs[qi]; qi++;
            hud({ Pregunta: qi + '/' + qs.length });
            msg.textContent = '';
            body.innerHTML =
              '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px;padding:12px;overflow:auto">' +
              '<div style="text-align:center;font-size:1.12rem;padding:0 6px">' + q.text + '</div>' +
              '<div id="opts" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;max-width:520px;width:100%;margin:0 auto"></div>' +
              '</div>';
            const box = body.querySelector('#opts');
            q.opts.forEach(opt => {
              const b = document.createElement('button');
              b.className = 'aw-choice';
              b.style.minHeight = '52px';
              b.textContent = opt;
              b.onclick = () => {
                if (b.dataset.done) return;
                box.querySelectorAll('button').forEach(x => { x.dataset.done = 1; x.style.pointerEvents = 'none'; });
                const ok = opt === q.correct;
                if (!byType[q.type]) byType[q.type] = { ok: 0, n: 0 };
                byType[q.type].n++;
                if (ok) { hits++; byType[q.type].ok++; b.classList.add('ok'); }
                else {
                  fails++; b.classList.add('bad');
                  box.querySelectorAll('button').forEach(x => { if (x.textContent === q.correct) x.classList.add('ok'); });
                }
                hud({ Pregunta: qi + '/' + qs.length });
                st.classList.add(ok ? 'aw-flash-ok' : 'aw-flash-bad');
                T(() => st.classList.remove(ok ? 'aw-flash-ok' : 'aw-flash-bad'), 380);
                T(askOne, ok ? 850 : 1400);
              };
              box.appendChild(b);
            });
          };
          askOne();
        };

        const nextRound = () => {
          if (round >= ROUNDS) return end();
          round++; hud();
          const scene = buildScene(ctx.rng, P);
          const qs = genQuestions(ctx.rng, scene, P);
          msg.textContent = 'Escena ' + round + ' de ' + ROUNDS + ': haz tu fotografía mental…';
          body.innerHTML = '';
          T(() => {
            showScene(scene);
            bar.style.transition = 'none'; bar.style.width = '100%';
            requestAnimationFrame(() => requestAnimationFrame(() => {
              bar.style.transition = 'width ' + P.expo + 'ms linear';
              bar.style.width = '0%';
            }));
            T(() => {
              bar.style.transition = 'none'; bar.style.width = '0%';
              msg.textContent = '';
              body.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim)">…</div>';
              T(() => askAll(qs, () => T(nextRound, 600)), 700);
            }, P.expo);
          }, 1400);
        };

        const end = () => {
          const total = hits + fails;
          const m = {
            aciertos: hits, fallos: fails,
            precision: total ? Math.round(100 * hits / total) : 0
          };
          Object.keys(byType).forEach(t => { m[t] = byType[t].ok + '/' + byType[t].n; });
          ctx.finish(m);
        };

        hud();
        msg.textContent = 'Prepárate…';
        T(nextRound, 600);
      }
    }
  });
})();
</script>
</body>
</html>
